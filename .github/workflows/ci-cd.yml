# .github/workflows/ci-cd.yml
name: CI/CD Pipeline - Employee Leave Management

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/leave-management
  DOCKER_TAG: ${{ github.sha }}
  JAVA_VERSION: '17'

jobs:
  # ============================================
  # JOB 1: BUILD AND TEST
  # ============================================
  build-and-test:
    name: Build and Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn clean compile -B

      - name: Run Unit Tests
        run: mvn test -B

      - name: Generate Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit

      - name: Generate Code Coverage Report
        run: mvn jacoco:report

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: target/site/jacoco/

      - name: Package Application
        run: mvn package -DskipTests -B

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v3
        with:
          name: application-jar
          path: target/*.jar
          retention-days: 5

  # ============================================
  # JOB 2: CODE QUALITY
  # ============================================
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check -B || true

      - name: Check Code Coverage Threshold
        run: |
          mvn clean test jacoco:report -B
          coverage=$(cat target/site/jacoco/index.html | \
            grep -o 'Total[^%]*%' | head -1 | \
            grep -o '[0-9]*%' | head -1 | tr -d '%')
          echo "Code coverage: $coverage%"
          if [ "$coverage" -lt 70 ]; then
            echo "Coverage below 70%! Current: $coverage%"
            exit 1
          fi

  # ============================================
  # JOB 3: DOCKER BUILD AND PUSH
  # ============================================
  docker-build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            latest

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  # ============================================
  # JOB 4: DEPLOY TO KUBERNETES
  # ============================================
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure Kubernetes context
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Update Docker image tag in deployment
        run: |
          sed -i "s|image: yourdockerhubusername/leave-management:latest|\
          image: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}|g" \
          k8s/deployment.yaml

      - name: Apply ConfigMap and Secrets
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml

      - name: Deploy MySQL
        run: kubectl apply -f k8s/mysql-deployment.yaml

      - name: Deploy Application
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/leave-management-deployment \
            --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -l app=leave-management
          kubectl get services leave-management-service

      - name: Run smoke tests
        run: |
          SERVICE_IP=$(kubectl get service leave-management-service \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "Service IP: $SERVICE_IP"
          curl -f http://$SERVICE_IP/actuator/health || echo "Health check pending"

  # ============================================
  # NOTIFICATION JOB
  # ============================================
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build-push, deploy]
    if: always()

    steps:
      - name: Notify on Success
        if: ${{ needs.deploy.result == 'success' }}
        run: |
          echo "✅ Deployment successful!"
          echo "Image: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}"

      - name: Notify on Failure
        if: ${{ failure() }}
        run: |
          echo "❌ Pipeline failed! Check the logs."